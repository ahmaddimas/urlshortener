spring:
  application:
    name: url-shortener

  mvc.static-path-pattern: /static/**

  datasource:
    url: jdbc:postgresql://localhost:5432/urlshortener
    username: appuser
    password: apppassword
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  base-url: http://localhost:8080
  short-code-length: 7
  max-collision: 3

server:
  port: 8080